<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🍌 Nano Banana Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f0f; color: #eee; font-family: system-ui; padding: 20px; }
  .container { max-width: 1200px; margin: 0 auto; }
  h1 { text-align: center; margin-bottom: 24px; color: #f5d000; font-size: 2rem; }
  
  .controls { background: #1a1a1a; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  textarea { width: 100%; background: #252525; border: 1px solid #333; color: #eee;
    border-radius: 8px; padding: 12px; font-size: 16px; resize: vertical; min-height: 80px; }
  
  .row { display: flex; gap: 16px; margin-top: 16px; align-items: flex-end; flex-wrap: wrap; }
  
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 13px; color: #aaa; }
  
  input[type="range"] { width: 160px; accent-color: #f5d000; }
  .count-display { color: #f5d000; font-weight: bold; font-size: 18px; width: 24px; }
  
  .upload-area { border: 2px dashed #444; border-radius: 8px; padding: 16px;
    text-align: center; cursor: pointer; transition: border-color .2s; min-width: 160px; }
  .upload-area:hover { border-color: #f5d000; }
  .upload-area img { max-height: 60px; max-width: 140px; border-radius: 4px; }
  
  button { background: #f5d000; color: #000; border: none; border-radius: 8px;
    padding: 12px 32px; font-size: 16px; font-weight: bold; cursor: pointer;
    transition: transform .1s; margin-left: auto; }
  button:hover { transform: scale(1.03); }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .img-card { background: #1a1a1a; border-radius: 12px; overflow: hidden; position: relative; }
  .img-card img { width: 100%; display: block; }
  .img-card .dl { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,.7);
    color: #fff; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
  
  .skeleton { background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite; height: 280px; border-radius: 12px; }
  @keyframes shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }
</style>
</head>
<body>
<div class="container">
  <h1>🍌 Nano Banana Pro</h1>
  
  <div class="controls">
    <textarea id="prompt" placeholder="Опиши изображение..."></textarea>
    <div class="row">
      <div class="field">
        <label>Кол-во генераций</label>
        <div style="display:flex;align-items:center;gap:10px">
          <input type="range" id="count" min="1" max="6" value="4"
            oninput="document.getElementById('countVal').textContent=this.value">
          <span class="count-display" id="countVal">4</span>
        </div>
      </div>
      
      <div class="field">
        <label>Референс (опционально)</label>
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
          <span id="uploadText">📎 Загрузить фото</span>
          <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="previewRef(this)">
        </div>
      </div>
      
      <button id="genBtn" onclick="generate()">⚡ Генерировать</button>
    </div>
  </div>
  
  <div class="grid" id="grid"></div>
</div>

<script>
let refFile = null;

function previewRef(input) {
  refFile = input.files[0];
  if (refFile) {
    const url = URL.createObjectURL(refFile);
    document.getElementById('uploadArea').innerHTML = `<img src="${url}"><br><small>✓ ${refFile.name}</small>`;
  }
}

async function generate() {
  const prompt = document.getElementById('prompt').value.trim();
  const count = parseInt(document.getElementById('count').value);
  if (!prompt) return alert('Введи промпт!');
  
  const btn = document.getElementById('genBtn');
  btn.disabled = true; btn.textContent = '⏳ Генерирую...';
  
  // показываем скелетоны
  const grid = document.getElementById('grid');
  grid.innerHTML = Array(count).fill('<div class="skeleton"></div>').join('');
  
  const fd = new FormData();
  fd.append('prompt', prompt);
  fd.append('count', count);
  if (refFile) fd.append('reference', refFile);
  
  try {
    const res = await fetch('/generate', { method: 'POST', body: fd });
    const data = await res.json();
    
    grid.innerHTML = '';
    data.images.forEach((b64, i) => {
      const src = `data:image/png;base64,${b64}`;
      const card = document.createElement('div');
      card.className = 'img-card';
      card.innerHTML = `<img src="${src}">
        <button class="dl" onclick="download('${src}', ${i+1})">⬇ Скачать</button>`;
      grid.appendChild(card);
    });
  } catch(e) {
    grid.innerHTML = `<p style="color:red">Ошибка: ${e.message}</p>`;
  }
  
  btn.disabled = false; btn.textContent = '⚡ Генерировать';
}

function download(src, n) {
  const a = document.createElement('a');
  a.href = src; a.download = `gen_${n}.png`; a.click();
}
</script>
</body>
</html>
